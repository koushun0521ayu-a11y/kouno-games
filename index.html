<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KOUNO GAMES</title>
</head>
<body>

<h1>KOUNO GAMES</h1>
<p>コウノクエスト（自動戦闘デモ）</p>

<p id="status"></p>

<script>
let hp = 100;
let enemyHp = 50;

function loop(){
  if(hp <= 0){
    document.getElementById("status").innerHTML = "ゲームオーバー";
    return;
  }

  if(enemyHp <= 0){
    document.getElementById("status").innerHTML = "勝利！";
    return;
  }

  let playerDamage = Math.floor(Math.random() * 10);
  let enemyDamage = Math.floor(Math.random() * 8);

  enemyHp -= playerDamage;
  hp -= enemyDamage;

  document.getElementById("status").innerHTML =
    "あなたHP: " + hp + "<br>" +
    "敵HP: " + enemyHp + "<br>" +
    "あなたの攻撃: " + playerDamage + "<br>" +
    "敵の攻撃: " + enemyDamage;

  setTimeout(loop, 1000);
}

loop();
</script>

</body>
</html>
